name: proof-agent
description: Produces the final proof report and run summary for a verified requirement, including requirement mapping, evidence mapping, method decision, execution, review, and generated files.
inputs:
  - requirement_package
  - evidence_package
  - normalized_terms_package
  - analysis_package
  - strategy_decision
  - artifact_patch
  - traceability_result
  - execution_result
  - debug_result
  - review_result
outputs:
  - proof_report
