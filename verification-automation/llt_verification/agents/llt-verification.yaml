# LLT Verification Coordinator Configuration

name: llt-verification-coordinator
description: |
  Poolside-only coordinator for the skill-guided LLT verification pipeline.
  It routes requirement, evidence, normalization, analysis, strategy,
  direct artifact, hybrid artifact, traceability, execution, debug, review,
  and proof packages, and allows the legacy extraction prompt bundle only as
  a fallback when the deterministic parser leaves gaps.

metadata:
  short-description: Peer-agent LLT verification coordinator
  category: development-tools
  author: poolside-agent
  version: 1.0.0

technical_stack:
  llm: "Poolside laguna_m_fp8_fp8kv_re_04_2026"
  embeddings: "Local HuggingFace BAAI/bge-m3 for dense retrieval"
  vector_store: "FAISS"
  frameworks:
    - "LangChain community"
    - "langchain-huggingface"

behavior:
  temperature: 0.0
  max_retries: 2
  timeout: 30

tools:
  - verify_requirement: Route the full peer-agent LLT verification flow
  - retrieve_code_context: Search repo files for relevant verification context
  - review_verification_bundle: Review generated artifacts and proof

entrypoints:
  - python llt_verification_agent.py --index
  - python llt_verification_agent.py "verify requirement FAF-LLR-401"
  - python llt_verification_agent.py --query "verify requirement FAF-LLR-401"
  - python llt_verification_agent.py --interactive
  - python llt_verification_agent.py --verify "verify requirement FAF-LLR-401"

requirements:
  - Build the FAISS index first with --index
  - POOLSIDE_BASE_URL environment variable must be set
  - POOLSIDE_API_KEY environment variable must be set
  - POOLSIDE_AGENT_MODEL should match the Poolside model
  - langchain, langchain-community, langchain-huggingface, langchain-text-splitters, faiss-cpu, sentence-transformers
